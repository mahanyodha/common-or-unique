<div class="card">

<h1>🎭 Common or Unique</h1>

<div id="join">
  <input id="name" placeholder="Enter name">
  <input id="room" placeholder="Room code">
  <button onclick="join()">Join</button>
</div>

<div id="lobby" class="hidden">
  <h2>Lobby</h2>
  <div id="players"></div>

  <div id="hostControls" class="hidden">
    <input id="prompt">
    <input id="timer" type="number" placeholder="Timer">
    <button onclick="start()">Start Game</button>
  </div>
</div>

<div id="game" class="hidden">
  <h2 id="roundInfo"></h2>
  <h3 id="promptDisplay"></h3>
  <div id="timerDisplay"></div>

  <input id="entries" placeholder="comma separated">
  <button onclick="submitEntries()">Submit</button>
</div>

<div id="turn" class="hidden">
  <h2 id="turnPlayer"></h2>
  <div id="roleReveal"></div>
  <select id="choices"></select>
  <button onclick="submitChoice()">Submit</button>
</div>

<div id="leaderboard" class="hidden">
  <h2>🏆 Leaderboard</h2>
  <div id="scores"></div>
</div>

</div>
